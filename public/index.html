<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirelia Lead Intelligence</title>
    <meta name="description" content="Spirelia AI-powered lead intelligence dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #06060f;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.07);
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124,58,237,0.25);
            --blue: #3b82f6;
            --green: #22c55e;
            --amber: #f59e0b;
            --text: #f1f1f4;
            --text-dim: #6b6b80;
            --text-mid: #9b9bb0;
            --radius: 14px;
            --nav-bg: rgba(6,6,15,0.85);
            --modal-bg: #111122;
            --th-bg: rgba(124,58,237,0.12);
        }

        [data-theme="light"] {
            --bg: #f4f6fa;
            --bg-card: rgba(255,255,255,0.85);
            --bg-card-hover: rgba(255,255,255,1);
            --border: rgba(0,0,0,0.08);
            --accent-glow: rgba(124,58,237,0.12);
            --text: #1a1a2e;
            --text-dim: #6b7280;
            --text-mid: #4b5563;
            --nav-bg: rgba(255,255,255,0.9);
            --modal-bg: #ffffff;
            --th-bg: rgba(124,58,237,0.08);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ─────────────────── */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 17px; letter-spacing: -.3px;
        }
        .nav-brand-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--blue));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #fff;
        }
        .btn-theme {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-mid); font-size: 17px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background .2s, color .2s, transform .3s;
            font-family: inherit;
        }
        .btn-theme:hover { background: rgba(124,58,237,0.15); color: var(--accent-light); }
        .btn-theme:active { transform: rotate(180deg); }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-user {
            font-size: 13px; color: var(--text-mid);
            display: none;
        }
        .nav-badge {
            font-size: 12px; font-weight: 600;
            padding: 5px 12px;
            background: rgba(124,58,237,0.15);
            color: var(--accent-light);
            border-radius: 20px;
            border: 1px solid rgba(124,58,237,0.2);
        }
        .btn-logout {
            padding: 7px 14px; font-size: 12px; font-weight: 600;
            background: rgba(239,68,68,0.1); color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px; cursor: pointer;
            font-family: inherit; transition: background .2s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.2); }

        /* ── Container ──────────────── */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* ── Stat Cards ─────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color .25s, background .25s;
        }
        .stat-card:hover { border-color: rgba(124,58,237,0.3); background: var(--bg-card-hover); }
        .stat-label { font-size: 12px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
        .stat-value { font-size: 28px; font-weight: 800; margin-top: 6px; letter-spacing: -1px; }
        .stat-value.purple { color: var(--accent-light); }
        .stat-value.blue   { color: var(--blue); }
        .stat-value.green  { color: var(--green); }
        .stat-value.amber  { color: var(--amber); }

        /* ── Filters ────────────────── */
        .filter-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        .filter-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-label {
            font-size: 10px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: .5px;
            display: flex; align-items: center; gap: 4px;
        }
        .filter-panel input, .filter-panel select {
            padding: 10px 12px; font-size: 13px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            width: 100%;
        }
        .filter-panel input:focus, .filter-panel select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .filter-panel input::placeholder { color: var(--text-dim); opacity: .5; }
        .filter-panel select option { background: var(--modal-bg); color: var(--text); }
        [data-theme="light"] .filter-panel input::placeholder { color: #9ca3af; opacity: 1; }

        .score-range-wrap {
            display: flex; align-items: center; gap: 8px;
        }
        .score-range-wrap input[type=number] {
            width: 60px; text-align: center; padding: 10px 6px;
        }
        .score-range-wrap input[type=number]::-webkit-inner-spin-button { opacity: 1; }
        .score-range-sep { color: var(--text-dim); font-size: 13px; }

        .toggle-wrap {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 0;
        }
        .toggle-switch {
            width: 40px; height: 22px;
            background: var(--border);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background .2s;
            flex-shrink: 0;
        }
        .toggle-switch.on { background: var(--accent); }
        .toggle-switch::after {
            content: '';
            position: absolute; top: 3px; left: 3px;
            width: 16px; height: 16px;
            background: #fff; border-radius: 50%;
            transition: transform .2s;
        }
        .toggle-switch.on::after { transform: translateX(18px); }
        .toggle-text { font-size: 12px; color: var(--text-mid); }

        .btn-reset {
            padding: 10px 16px; font-size: 12px; font-weight: 600;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-mid);
            cursor: pointer; font-family: inherit;
            transition: background .2s, color .2s;
            white-space: nowrap; align-self: end;
        }
        .btn-reset:hover { background: rgba(255,255,255,0.08); color: var(--text); }

        .btn-apply {
            padding: 10px 16px; font-size: 12px; font-weight: 600;
            background: var(--accent); color: white;
            border: none;
            border-radius: 8px; cursor: pointer; font-family: inherit;
            transition: opacity .2s; white-space: nowrap; flex: 1; align-self: end;
        }
        .btn-apply:hover { opacity: 0.9; }

        .btn-toggle-adv {
            background: none; border: none;
            color: var(--accent-light); font-size: 12px;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; gap: 4px;
            padding: 8px 0 0; font-weight: 500;
        }
        .btn-toggle-adv:hover { text-decoration: underline; }
        .adv-hidden { display: none !important; }

        .filter-count {
            font-size: 11px; color: var(--accent-light);
            margin-top: 8px; font-weight: 500;
        }

        /* ── Table Card ─────────────── */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .table-wrap { overflow-x: auto; max-height: 65vh; }
        .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrap::-webkit-scrollbar-track { background: transparent; }
        .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 2; }
        thead th {
            padding: 12px 14px;
            background: var(--th-bg);
            color: var(--accent-light);
            font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: .6px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        [data-theme="light"] thead th { color: var(--accent); }
        [data-theme="light"] .score-high { background: rgba(34,197,94,0.15); color: #15803d; }
        [data-theme="light"] .score-mid  { background: rgba(245,158,11,0.15); color: #b45309; }
        [data-theme="light"] .score-low  { background: rgba(239,68,68,0.12); color: #dc2626; }
        [data-theme="light"] .nav-brand-icon { color: #fff; }
        [data-theme="light"] .modal-card { box-shadow: 0 20px 60px rgba(0,0,0,.15); }
        [data-theme="light"] .stat-card { box-shadow: 0 2px 8px rgba(0,0,0,.04); }
        [data-theme="light"] tbody td a { color: #6d28d9; }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background .15s;
            cursor: pointer;
        }
        tbody tr:hover { background: rgba(124,58,237,0.05); }
        tbody td {
            padding: 11px 14px; color: var(--text-mid);
            max-width: 260px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        tbody td a {
            color: var(--blue); text-decoration: none;
        }
        tbody td a:hover { text-decoration: underline; }

        /* ── Score Badge ─────────────── */
        .score-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 20px; font-weight: 700; font-size: 12px;
        }
        .score-high   { background: rgba(34,197,94,0.12); color: #86efac; }
        .score-mid    { background: rgba(245,158,11,0.12); color: #fcd34d; }
        .score-low    { background: rgba(239,68,68,0.1); color: #fca5a5; }

        /* ── Fit Section ────────────── */
        .fit-section { margin-top: 24px; }
        .fit-section h2 {
            font-size: 15px; font-weight: 600; color: var(--text);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .fit-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .fit-card {
            padding: 16px; border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: border-color .2s;
        }
        .fit-card:hover { border-color: rgba(34,197,94,0.3); }
        .fit-card strong { color: var(--text); font-size: 14px; }
        .fit-card p { color: var(--text-dim); font-size: 12px; margin-top: 6px; line-height: 1.5; }

        /* ── Loader ──────────────────── */
        .loader {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 0; gap: 16px;
        }
        .loader-ring {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: var(--text-dim); font-size: 14px; }

        .error-box {
            padding: 16px 20px; border-radius: 12px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5; font-size: 14px;
            display: none;
        }

        .hidden { display: none !important; }

        /* ── Modal Overlay ────────────── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity .25s, visibility .25s;
            padding: 16px;
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }

        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%; max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,.7), 0 0 60px var(--accent-glow);
            animation: modalIn .3s cubic-bezier(.16,1,.3,1);
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(.97); } }

        .modal-card::-webkit-scrollbar { width: 5px; }
        .modal-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
            background: var(--modal-bg);
            z-index: 2;
        }
        .modal-header h2 {
            font-size: 18px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .modal-close {
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-mid); font-size: 18px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background .2s, color .2s;
        }
        .modal-close:hover { background: rgba(239,68,68,0.15); color: #fca5a5; }

        .modal-body { padding: 20px 24px 28px; }

        .modal-score-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .modal-score-num {
            font-size: 36px; font-weight: 800; letter-spacing: -2px;
        }
        .modal-score-label {
            font-size: 12px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: .5px;
        }
        .modal-score-reason {
            font-size: 13px; color: var(--text-mid); line-height: 1.5; margin-top: 2px;
        }

        .modal-field {
            display: flex; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .modal-field:last-child { border-bottom: none; }
        .modal-field-icon {
            width: 36px; height: 36px; flex-shrink: 0;
            background: rgba(124,58,237,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-light); font-size: 16px;
        }
        .modal-field-content { flex: 1; min-width: 0; }
        .modal-field-label {
            font-size: 11px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: .5px;
        }
        .modal-field-value {
            font-size: 14px; color: var(--text); margin-top: 3px;
            word-break: break-word; line-height: 1.5;
        }
        .modal-field-value a {
            color: var(--blue); text-decoration: none;
        }
        .modal-field-value a:hover { text-decoration: underline; }
        .modal-field-value .empty { color: var(--text-dim); font-style: italic; }

        /* ── Mobile ──────────────────── */
        @media (max-width: 768px) {
            .navbar { padding: 12px 16px; }
            .nav-brand { font-size: 15px; }
            .nav-user { display: none !important; }
            .container { padding: 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 14px; }
            .stat-value { font-size: 22px; }
            .filter-row { grid-template-columns: 1fr 1fr; }
            .filter-row-2 { grid-template-columns: 1fr 1fr; }
            .filter-panel { padding: 14px 16px; }
            .fit-grid { grid-template-columns: 1fr; }
            .modal-card { max-width: 100%; border-radius: 16px; }
            .modal-header { padding: 16px 18px 14px; }
            .modal-body { padding: 16px 18px 24px; }
            .modal-score-num { font-size: 28px; }
        }
        @media (max-width: 480px) {
            .filter-row, .filter-row-2 { grid-template-columns: 1fr; }
            .score-range-wrap { justify-content: stretch; }
            .score-range-wrap input[type=number] { flex: 1; }
        }
        @media (min-width: 769px) {
            .nav-user { display: block; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-brand-icon"><i class="bi bi-radar"></i></div>
            <span>Spirelia Intelligence</span>
        </div>
        <div class="nav-right">
            <span class="nav-badge" id="leadCount">—</span>
            <span class="nav-user" id="userEmail"></span>
            <button class="btn-theme" id="themeToggle" title="Toggle theme"><i class="bi bi-moon-stars-fill"></i></button>
            <button class="btn-logout" id="logoutBtn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-row hidden" id="statsRow">
            <div class="stat-card"><div class="stat-label"><i class="bi bi-people"></i> Total Leads</div><div class="stat-value purple" id="statTotal">0</div></div>
            <div class="stat-card"><div class="stat-label"><i class="bi bi-graph-up-arrow"></i> Avg Score</div><div class="stat-value blue" id="statAvg">—</div></div>
            <div class="stat-card"><div class="stat-label"><i class="bi bi-trophy"></i> Top Score</div><div class="stat-value green" id="statTop">—</div></div>
            <div class="stat-card"><div class="stat-label"><i class="bi bi-buildings"></i> Companies</div><div class="stat-value amber" id="statCompanies">0</div></div>
        </div>

        <!-- Filters -->
        <div class="filter-panel hidden" id="filterBar">
            <!-- Row 1: Search + Score + Sector + Reset -->
            <div class="filter-row">
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-search"></i> Global Search</div>
                    <input type="text" id="searchBox" placeholder="Company, position, keyword…">
                </div>
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-speedometer2"></i> Score Range</div>
                    <div class="score-range-wrap">
                        <input type="number" id="scoreMin" min="0" max="100" placeholder="0">
                        <span class="score-range-sep">to</span>
                        <input type="number" id="scoreMax" min="0" max="100" placeholder="100">
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-building"></i> Sector</div>
                    <select id="sectorFilter">
                        <option value="">All Sectors</option>
                        <option value="auto">Automotive</option>
                        <option value="pharma">Pharma / MedTech</option>
                        <option value="aero">Aerospace</option>
                        <option value="manufacturing">Manufacturing</option>
                        <option value="gcc">GCC / R&D Center</option>
                        <option value="agri">Agriculture</option>
                        <option value="tech">Technology</option>
                    </select>
                </div>
                <div style="display:flex; gap:8px; align-self: end;">
                    <button class="btn-apply" id="applyBtn"><i class="bi bi-funnel"></i> Apply</button>
                    <button class="btn-reset" id="resetBtn" title="Reset Filters"><i class="bi bi-arrow-counterclockwise"></i></button>
                </div>
            </div>

            <!-- Toggle to show advanced -->
            <button class="btn-toggle-adv" id="toggleAdv"><i class="bi bi-sliders"></i> Advanced Filters</button>

            <!-- Row 2: Position + Contact + Fit Reason + Date -->
            <div class="filter-row-2 adv-hidden" id="advRow">
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-person-badge"></i> Position</div>
                    <select id="positionFilter">
                        <option value="">All Positions</option>
                        <option value="vp">VP / Vice President</option>
                        <option value="director">Director</option>
                        <option value="head">Head / Lead</option>
                        <option value="manager">Manager</option>
                        <option value="cto">CTO / CXO</option>
                    </select>
                </div>
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-person-check"></i> Has Contact</div>
                    <div class="toggle-wrap">
                        <div class="toggle-switch" id="contactToggle"></div>
                        <span class="toggle-text">Email or LinkedIn</span>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-lightbulb"></i> Fit Reason</div>
                    <input type="text" id="fitSearch" placeholder="patent, R&D, innovation…">
                </div>
                <div class="filter-group">
                    <div class="filter-label"><i class="bi bi-calendar-range"></i> Date Range</div>
                    <div class="score-range-wrap">
                        <input type="date" id="dateFrom" style="padding:10px 4px" title="From Date">
                        <span class="score-range-sep">to</span>
                        <input type="date" id="dateTo" style="padding:10px 4px" title="To Date">
                    </div>
                </div>
            </div>

            <div class="filter-count" id="filterCount"></div>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader">
            <div class="loader-ring"></div>
            <p>Loading intelligence data…</p>
        </div>

        <!-- Error -->
        <div id="errorBox" class="error-box"></div>

        <!-- Table -->
        <div class="table-card hidden" id="tableCard">
            <div class="table-wrap">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Fit Reasons -->
        <div class="fit-section hidden" id="fitSection">
            <h2><i class="bi bi-lightbulb"></i> Fit Reason Highlights</h2>
            <div class="fit-grid" id="fitGrid"></div>
        </div>
    </div>

    <!-- Lead Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <div class="modal-header">
                <h2><i class="bi bi-building" id="modalHeaderIcon"></i> <span id="modalTitle">Lead Detail</span></h2>
                <button class="modal-close" id="modalClose"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

<script>
    // ─── Auth Gate (localStorage-persistent) ──────
    // Only redirect if NO token exists. On refresh, stay logged in.
    // Only explicit Logout clears session.
    const TOKEN = localStorage.getItem('spirelia_token');
    if (!TOKEN) window.location.href = '/login.html';

    const AUTH = { Authorization: 'Bearer ' + TOKEN };

    // Show cached email immediately (no redirect on failure)
    (async () => {
        const cachedEmail = localStorage.getItem('spirelia_email');
        if (cachedEmail) document.getElementById('userEmail').textContent = cachedEmail;
        try {
            const r = await fetch('/api/check-auth', { headers: AUTH });
            if (r.ok) {
                const d = await r.json();
                document.getElementById('userEmail').textContent = d.email;
                localStorage.setItem('spirelia_email', d.email);
            }
            // If NOT ok, do nothing — stay on dashboard with cached session
        } catch {
            // Network error — stay on dashboard, don't redirect
        }
    })();

    // ─── DOM Refs ─────────────────────────────────
    const $ = id => document.getElementById(id);
    const searchBox  = $('searchBox');
    const resetBtn   = $('resetBtn');
    const loader     = $('loader');
    const errorBox   = $('errorBox');
    const statsRow   = $('statsRow');
    const filterBar  = $('filterBar');
    const tableCard  = $('tableCard');
    const tableHead  = $('tableHead');
    const tableBody  = $('tableBody');
    const fitSection = $('fitSection');
    const fitGrid    = $('fitGrid');
    const leadCount  = $('leadCount');

    let allHeaders = [], allLeads = [];

    // ─── Fetch Leads ──────────────────────────────
    async function fetchLeads() {
        try {
            const res = await fetch('/api/leads', { headers: AUTH });
            if (res.status === 401) {
                // Session expired on server — show error but DON'T redirect
                // User must explicitly click Logout to clear session
                throw new Error('Session expired on server. Please logout and login again.');
            }
            if (!res.ok) {
                const e = await res.json().catch(() => ({}));
                throw new Error(e.error || 'Server error');
            }

            const data = await res.json();
            allHeaders = Array.isArray(data.headers) ? data.headers : [];
            allLeads   = Array.isArray(data.leads)   ? data.leads   : [];

            if (allHeaders.length === 0) throw new Error('No data found in sheet.');

            leadCount.textContent = allLeads.length + ' leads';

            computeStats();
            renderTable(allHeaders, allLeads);
            renderFit(allLeads);

            loader.classList.add('hidden');
            statsRow.classList.remove('hidden');
            filterBar.classList.remove('hidden');
            tableCard.classList.remove('hidden');
            fitSection.classList.remove('hidden');
        } catch (err) {
            loader.classList.add('hidden');
            errorBox.style.display = 'block';
            errorBox.textContent = '⚠ ' + err.message;
            leadCount.textContent = '0 leads';
        }
    }

    // ─── Stats ────────────────────────────────────
    function computeStats() {
        $('statTotal').textContent = allLeads.length;
        const scores = allLeads.map(l => parseInt(l['Score'])).filter(n => !isNaN(n));
        if (scores.length) {
            $('statAvg').textContent = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
            $('statTop').textContent = Math.max(...scores);
        }
        const companies = new Set(allLeads.map(l => l['Company']).filter(Boolean));
        $('statCompanies').textContent = companies.size;
    }

    // ─── Render Table ─────────────────────────────
    function renderTable(headers, leads) {
        tableHead.innerHTML = '<tr>' + headers.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';
        tableBody.innerHTML = leads.map((lead, idx) =>
            `<tr data-idx="${idx}" onclick="openLeadModal(${idx})">` + headers.map(h => {
                let v = lead[h] || '';
                if (h === 'Domain') {
                    const compName = lead['Company'] || v || 'Company';
                    const searchQuery = compName + " linkedin and official website and contact";
                    const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`;
                    return `<td><a href="${searchUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><i class="bi bi-google"></i> Google Search</a></td>`;
                }
                if (h === 'Score' && v) {
                    const n = parseInt(v);
                    const cls = n >= 90 ? 'score-high' : n >= 70 ? 'score-mid' : 'score-low';
                    return `<td><span class="score-badge ${cls}">${esc(v)}</span></td>`;
                }
                if (h === 'Wikipedia Link' && !v) {
                    return `<td style="text-align:center"><i class="bi bi-exclamation-triangle-fill" style="color:var(--amber); font-size:16px; cursor:pointer;" title="No Wikipedia Data" onclick="openLeadModal(${idx}, true); event.stopPropagation();"></i></td>`;
                }
                if (v.startsWith('http')) {
                    const label = v.length > 35 ? v.slice(0, 35) + '…' : v;
                    return `<td><a href="${esc(v)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(label)}</a></td>`;
                }
                return `<td title="${esc(v)}">${esc(v)}</td>`;
            }).join('') + '</tr>'
        ).join('');
        currentFilteredLeads = leads;
    }

    let currentFilteredLeads = [];

    // ─── Icon Map ─────────────────────────────────
    const FIELD_ICONS = {
        'Date': 'bi-calendar3',
        'Company': 'bi-building',
        'Position': 'bi-person-badge',
        'Role Summary': 'bi-file-text',
        'Company Bio': 'bi-info-circle',
        'Posted': 'bi-clock-history',
        'Domain': 'bi-google',
        'Email': 'bi-envelope-at',
        'LinkedIn': 'bi-linkedin',
        'Score': 'bi-speedometer2',
        'Decision Maker Link': 'bi-person-lines-fill',
        'Wikipedia Link': 'bi-wikipedia',
        'Message ID': 'bi-hash',
        'Fit Reason': 'bi-lightbulb',
        'Outreach Msg': 'bi-pencil-square',
        'Notes': 'bi-journal-text'
    };

    // ─── Lead Detail Modal ────────────────────────
    const modalOverlay = $('modalOverlay');
    const modalCard    = $('modalCard');
    const modalClose   = $('modalClose');
    const modalTitle   = $('modalTitle');
    const modalBody    = $('modalBody');

    function openLeadModal(idx, showWikiWarning = false) {
        const lead = currentFilteredLeads[idx];
        if (!lead) return;

        const company = lead['Company'] || 'Lead Detail';
        modalTitle.textContent = company;

        // Update header icon
        const headerIcon = $('modalHeaderIcon');
        if (showWikiWarning) {
            headerIcon.className = 'bi bi-exclamation-triangle-fill';
            headerIcon.style.color = 'var(--amber)';
        } else {
            headerIcon.className = 'bi bi-building';
            headerIcon.style.color = '';
        }

        let html = '';

        if (showWikiWarning) {
            html += `<div style="background:rgba(245,158,11,0.1); color:var(--amber); border:1px solid rgba(245,158,11,0.2); padding:12px 16px; border-radius:12px; margin-bottom:16px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px;">
                <i class="bi bi-exclamation-triangle-fill" style="font-size:18px;"></i>
                <span>No Wikipedia intelligence data found for this company.</span>
            </div>`;
        }

        // Score + Fit Reason hero row
        const score = parseInt(lead['Score']);
        const fitReason = lead['Fit Reason'] || '';
        if (!isNaN(score) || fitReason) {
            const sColor = score >= 90 ? 'var(--green)' : score >= 70 ? 'var(--amber)' : 'var(--blue)';
            html += `<div class="modal-score-row">`;
            if (!isNaN(score)) {
                html += `<div><div class="modal-score-num" style="color:${sColor}">${score}</div><div class="modal-score-label">Fit Score</div></div>`;
            }
            if (fitReason) {
                html += `<div style="flex:1"><div class="modal-score-label">Why This Lead Fits</div><div class="modal-score-reason">${esc(fitReason)}</div></div>`;
            }
            html += `</div>`;
        }

        // All fields
        const skipInBody = ['Score', 'Fit Reason', 'Notes'];
        allHeaders.filter(h => !skipInBody.includes(h)).forEach(h => {
            const v = lead[h] || '';
            const icon = FIELD_ICONS[h] || 'bi-dot';
            let valHtml;

            if (!v) {
                valHtml = '<span class="empty">—</span>';
            } else if (v.startsWith('http')) {
                const label = v.length > 50 ? v.slice(0, 50) + '…' : v;
                valHtml = `<a href="${esc(v)}" target="_blank" rel="noopener"><i class="bi bi-box-arrow-up-right" style="margin-right:4px"></i>${esc(label)}</a>`;
            } else if (h === 'Domain') {
                const compName = lead['Company'] || v || 'Company';
                const searchQuery = compName + " linkedin website contact";
                const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`;
                valHtml = `<a href="${searchUrl}" target="_blank" rel="noopener"><i class="bi bi-google" style="margin-right:4px"></i>Search for ${esc(compName)}</a>`;
            } else if (h === 'Outreach Msg') {
                valHtml = `<div style="background:rgba(124,58,237,0.05); padding:12px; border-radius:8px; border:1px solid rgba(124,58,237,0.1); white-space:pre-wrap; font-family:monospace; font-size:12px; position:relative;">
                    ${esc(v)}
                    <button onclick="copyToClipboard(this, \`${v.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" style="position:absolute; top:8px; right:8px; background:var(--accent); color:white; border:none; border-radius:4px; padding:4px 8px; font-size:10px; cursor:pointer; font-family:sans-serif;"><i class="bi bi-clipboard"></i> Copy</button>
                </div>`;
            } else {
                valHtml = esc(v);
            }

            html += `<div class="modal-field">
                <div class="modal-field-icon"><i class="bi ${icon}"></i></div>
                <div class="modal-field-content">
                    <div class="modal-field-label">${esc(h)}</div>
                    <div class="modal-field-value">${valHtml}</div>
                </div>
            </div>`;
        });

        // Always render Notes at the very bottom
        const notesValue = lead['Notes'] || '';
        const sheetRow = lead._sheetRow;
        if (sheetRow) {
            html += `<div class="modal-field">
                <div class="modal-field-icon"><i class="bi bi-journal-text"></i></div>
                <div class="modal-field-content">
                    <div class="modal-field-label">Notes</div>
                    <div class="modal-field-value">
                        <div style="position:relative;">
                            <textarea id="notes-${sheetRow}" style="width:100%; min-height:80px; background:rgba(0,0,0,0.1); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-family:inherit; font-size:13px; resize:vertical;" placeholder="Add private notes here...">${notesValue ? esc(notesValue) : ''}</textarea>
                            <button onclick="saveNotes(${sheetRow}, this)" style="margin-top:6px; background:var(--accent); color:white; border:none; border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; font-weight:600;"><i class="bi bi-save"></i> Save Notes</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        modalBody.innerHTML = html;
        modalOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ─── Fit Reasons ──────────────────────────────
    function renderFit(leads) {
        fitGrid.innerHTML = '';
        const fitH = allHeaders.find(h => h.toLowerCase().includes('fit'));
        const nameH = allHeaders.find(h => h.toLowerCase().includes('company')) || allHeaders[1];
        if (!fitH) return;

        leads.filter(l => l[fitH] && !l[fitH].toLowerCase().startsWith('does not'))
             .slice(0, 6)
             .forEach(lead => {
                 fitGrid.innerHTML += `<div class="fit-card"><strong>${esc(lead[nameH] || 'Unknown')}</strong><p>${esc(lead[fitH])}</p></div>`;
             });
    }

    // ─── Escape ───────────────────────────────────
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function copyToClipboard(btn, text) {
        try {
            await navigator.clipboard.writeText(text);
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-check"></i> Copied!';
            btn.style.background = 'var(--green)';
            setTimeout(() => {
                btn.innerHTML = oldHtml;
                btn.style.background = 'var(--accent)';
            }, 2000);
        } catch (err) {
            console.error('Copy failed', err);
        }
    }

    async function saveNotes(sheetRow, btn) {
        const txt = document.getElementById('notes-' + sheetRow);
        if (!txt) return;
        const notes = txt.value;
        const oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Saving...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/leads/notes', {
                method: 'POST',
                headers: { ...AUTH, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sheetRow, notes })
            });
            if (!res.ok) throw new Error('Failed to save');
            
            // Update local state so it doesn't revert if they reopen modal
            const lead = allLeads.find(l => l._sheetRow === sheetRow);
            if (lead) lead['Notes'] = notes;

            btn.innerHTML = '<i class="bi bi-check-circle"></i> Saved!';
            btn.style.background = 'var(--green)';
        } catch (e) {
            btn.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Error';
            btn.style.background = '#ef4444';
            console.error(e);
        }

        setTimeout(() => {
            btn.innerHTML = oldHtml;
            btn.style.background = 'var(--accent)';
            btn.disabled = false;
        }, 2000);
    }

    // ─── Filter Logic ─────────────────────────────
    const scoreMin      = $('scoreMin');
    const scoreMax      = $('scoreMax');
    const sectorFilter  = $('sectorFilter');
    const positionFilter = $('positionFilter');
    const contactToggle = $('contactToggle');
    const fitSearch     = $('fitSearch');
    const dateFrom      = $('dateFrom');
    const dateTo        = $('dateTo');
    const toggleAdv     = $('toggleAdv');
    const advRow        = $('advRow');
    const filterCount   = $('filterCount');
    let contactOnly = false;

    // Sector keywords map
    const SECTOR_MAP = {
        auto: ['automotive','auto','motor','vehicle','car','ev','tesla','ford','toyota','bmw'],
        pharma: ['pharma','medtech','biotech','medical','drug','health','bayer','pfizer','novartis'],
        aero: ['aerospace','aviation','defense','defence','satellite','airbus','boeing'],
        manufacturing: ['manufacturing','industrial','factory','production','steel','cement'],
        gcc: ['gcc','global capability','r&d center','r&d centre','engineering center','innovation hub'],
        agri: ['agriculture','agri','crop','farm','seed','fertilizer'],
        tech: ['technology','software','it','digital','cloud','saas','ai','data']
    };

    // Position keywords map
    const POSITION_MAP = {
        vp: ['vp','vice president'],
        director: ['director'],
        head: ['head','lead','principal'],
        manager: ['manager'],
        cto: ['cto','coo','cio','cfo','chief']
    };

    // Toggle advanced row
    toggleAdv.addEventListener('click', () => {
        const hidden = advRow.classList.toggle('adv-hidden');
        toggleAdv.innerHTML = hidden
            ? '<i class="bi bi-sliders"></i> Advanced Filters'
            : '<i class="bi bi-sliders"></i> Hide Advanced';
    });

    // Contact toggle
    contactToggle.addEventListener('click', () => {
        contactOnly = !contactOnly;
        contactToggle.classList.toggle('on', contactOnly);
        applyFilters();
    });

    // Attach listeners
    const applyBtn = $('applyBtn');
    applyBtn.addEventListener('click', applyFilters);
    [searchBox, fitSearch].forEach(el => el.addEventListener('keypress', e => { if(e.key === 'Enter') applyFilters(); }));

    resetBtn.addEventListener('click', () => {
        searchBox.value = ''; scoreMin.value = ''; scoreMax.value = '';
        sectorFilter.value = ''; positionFilter.value = '';
        fitSearch.value = ''; dateFrom.value = ''; dateTo.value = '';
        contactOnly = false;
        contactToggle.classList.remove('on');
        filterCount.textContent = '';
        renderTable(allHeaders, allLeads);
    });

    function applyFilters() {
        let f = [...allLeads];

        // 1. Global search
        const q = searchBox.value.trim().toLowerCase();
        if (q) f = f.filter(l => Object.values(l).some(v => String(v).toLowerCase().includes(q)));

        // 2. Score range
        const sMin = parseInt(scoreMin.value);
        const sMax = parseInt(scoreMax.value);
        if (!isNaN(sMin)) f = f.filter(l => { const s = parseInt(l['Score']); return !isNaN(s) && s >= sMin; });
        if (!isNaN(sMax)) f = f.filter(l => { const s = parseInt(l['Score']); return !isNaN(s) && s <= sMax; });

        // 3. Sector
        const sec = sectorFilter.value;
        if (sec && SECTOR_MAP[sec]) {
            const kw = SECTOR_MAP[sec];
            f = f.filter(l => {
                const blob = ((l['Company']||'')+(l['Company Bio']||'')+(l['Fit Reason']||'')+(l['Role Summary']||'')).toLowerCase();
                return kw.some(k => blob.includes(k));
            });
        }

        // 4. Position
        const pos = positionFilter.value;
        if (pos && POSITION_MAP[pos]) {
            const kw = POSITION_MAP[pos];
            f = f.filter(l => {
                const p = (l['Position']||'').toLowerCase();
                return kw.some(k => p.includes(k));
            });
        }

        // 5. Has contact
        if (contactOnly) {
            f = f.filter(l => (l['Email'] && l['Email'].includes('@')) || (l['LinkedIn'] && l['LinkedIn'].startsWith('http')));
        }

        // 6. Fit reason keyword
        const fk = fitSearch.value.trim().toLowerCase();
        if (fk) f = f.filter(l => (l['Fit Reason']||'').toLowerCase().includes(fk));

        // 7. Date range
        const df = dateFrom.value;
        const dt = dateTo.value;
        if (df) {
            const since = new Date(df);
            f = f.filter(l => {
                const d = new Date(l['Date']);
                return !isNaN(d) && d >= since;
            });
        }
        if (dt) {
            const until = new Date(dt);
            until.setHours(23, 59, 59, 999);
            f = f.filter(l => {
                const d = new Date(l['Date']);
                return !isNaN(d) && d <= until;
            });
        }

        renderTable(allHeaders, f);
        const active = [q, !isNaN(sMin), !isNaN(sMax), sec, pos, contactOnly, fk, df, dt].filter(Boolean).length;
        filterCount.textContent = active ? `${f.length} lead${f.length!==1?'s':''} matching ${active} filter${active!==1?'s':''}` : '';
    }

    // ─── Logout ───────────────────────────────────
    async function logout() {
        try { await fetch('/api/logout', { method: 'POST', headers: AUTH }); } catch {}
        localStorage.removeItem('spirelia_token');
        localStorage.removeItem('spirelia_email');
        window.location.href = '/login.html';
    }

    // ─── Theme Toggle ─────────────────────────────
    const themeToggle = $('themeToggle');
    const savedTheme = localStorage.getItem('spirelia_theme') || 'dark';
    if (savedTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    updateThemeIcon();

    themeToggle.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        if (isLight) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('spirelia_theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('spirelia_theme', 'light');
        }
        updateThemeIcon();
    });

    function updateThemeIcon() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        themeToggle.innerHTML = isLight
            ? '<i class="bi bi-sun-fill"></i>'
            : '<i class="bi bi-moon-stars-fill"></i>';
    }

    // ─── Leave Confirmation ───────────────────────
    window.addEventListener('beforeunload', function (e) {
        e.preventDefault();
        e.returnValue = 'Are you sure you want to leave? Unsaved changes may be lost.';
    });

    // ─── Init ─────────────────────────────────────
    fetchLeads();
</script>
</body>
</html>
