<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirelia Lead Intelligence</title>
    <meta name="description" content="Spirelia AI-powered lead intelligence dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #06060f;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.07);
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124,58,237,0.25);
            --blue: #3b82f6;
            --green: #22c55e;
            --amber: #f59e0b;
            --text: #f1f1f4;
            --text-dim: #6b6b80;
            --text-mid: #9b9bb0;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ─────────────────── */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: rgba(6,6,15,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 17px; letter-spacing: -.3px;
        }
        .nav-brand-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--blue));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-user {
            font-size: 13px; color: var(--text-mid);
            display: none;
        }
        .nav-badge {
            font-size: 12px; font-weight: 600;
            padding: 5px 12px;
            background: rgba(124,58,237,0.15);
            color: var(--accent-light);
            border-radius: 20px;
            border: 1px solid rgba(124,58,237,0.2);
        }
        .btn-logout {
            padding: 7px 14px; font-size: 12px; font-weight: 600;
            background: rgba(239,68,68,0.1); color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px; cursor: pointer;
            font-family: inherit; transition: background .2s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.2); }

        /* ── Container ──────────────── */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* ── Stat Cards ─────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color .25s, background .25s;
        }
        .stat-card:hover { border-color: rgba(124,58,237,0.3); background: var(--bg-card-hover); }
        .stat-label { font-size: 12px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
        .stat-value { font-size: 28px; font-weight: 800; margin-top: 6px; letter-spacing: -1px; }
        .stat-value.purple { color: var(--accent-light); }
        .stat-value.blue   { color: var(--blue); }
        .stat-value.green  { color: var(--green); }
        .stat-value.amber  { color: var(--amber); }

        /* ── Filters ────────────────── */
        .filter-bar {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 11px 14px; font-size: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            min-width: 0;
        }
        .filter-bar input:focus, .filter-bar select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .filter-bar input::placeholder { color: rgba(255,255,255,.15); }
        .filter-bar select option { background: #1a1a2e; color: var(--text); }
        .search-input { flex: 2; min-width: 180px; }
        .filter-select { flex: 1; min-width: 140px; }
        .filter-value { flex: 1; min-width: 140px; }
        .btn-reset {
            padding: 11px 18px; font-size: 13px; font-weight: 600;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--text-mid);
            cursor: pointer; font-family: inherit;
            transition: background .2s, color .2s;
            white-space: nowrap;
        }
        .btn-reset:hover { background: rgba(255,255,255,0.08); color: var(--text); }

        /* ── Table Card ─────────────── */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .table-wrap { overflow-x: auto; max-height: 65vh; }
        .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrap::-webkit-scrollbar-track { background: transparent; }
        .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 2; }
        thead th {
            padding: 12px 14px;
            background: rgba(124,58,237,0.12);
            color: var(--accent-light);
            font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: .6px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background .15s;
            cursor: pointer;
        }
        tbody tr:hover { background: rgba(124,58,237,0.05); }
        tbody td {
            padding: 11px 14px; color: var(--text-mid);
            max-width: 260px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        tbody td a {
            color: var(--blue); text-decoration: none;
        }
        tbody td a:hover { text-decoration: underline; }

        /* ── Score Badge ─────────────── */
        .score-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 20px; font-weight: 700; font-size: 12px;
        }
        .score-high   { background: rgba(34,197,94,0.12); color: #86efac; }
        .score-mid    { background: rgba(245,158,11,0.12); color: #fcd34d; }
        .score-low    { background: rgba(239,68,68,0.1); color: #fca5a5; }

        /* ── Fit Section ────────────── */
        .fit-section { margin-top: 24px; }
        .fit-section h2 {
            font-size: 15px; font-weight: 600; color: var(--text);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .fit-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .fit-card {
            padding: 16px; border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: border-color .2s;
        }
        .fit-card:hover { border-color: rgba(34,197,94,0.3); }
        .fit-card strong { color: var(--text); font-size: 14px; }
        .fit-card p { color: var(--text-dim); font-size: 12px; margin-top: 6px; line-height: 1.5; }

        /* ── Loader ──────────────────── */
        .loader {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 0; gap: 16px;
        }
        .loader-ring {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: var(--text-dim); font-size: 14px; }

        .error-box {
            padding: 16px 20px; border-radius: 12px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5; font-size: 14px;
            display: none;
        }

        .hidden { display: none !important; }

        /* ── Modal Overlay ────────────── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity .25s, visibility .25s;
            padding: 16px;
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }

        .modal-card {
            background: #111122;
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%; max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,.7), 0 0 60px var(--accent-glow);
            animation: modalIn .3s cubic-bezier(.16,1,.3,1);
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(.97); } }

        .modal-card::-webkit-scrollbar { width: 5px; }
        .modal-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
            background: #111122;
            z-index: 2;
        }
        .modal-header h2 {
            font-size: 18px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .modal-close {
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-mid); font-size: 18px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background .2s, color .2s;
        }
        .modal-close:hover { background: rgba(239,68,68,0.15); color: #fca5a5; }

        .modal-body { padding: 20px 24px 28px; }

        .modal-score-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .modal-score-num {
            font-size: 36px; font-weight: 800; letter-spacing: -2px;
        }
        .modal-score-label {
            font-size: 12px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: .5px;
        }
        .modal-score-reason {
            font-size: 13px; color: var(--text-mid); line-height: 1.5; margin-top: 2px;
        }

        .modal-field {
            display: flex; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .modal-field:last-child { border-bottom: none; }
        .modal-field-icon {
            width: 36px; height: 36px; flex-shrink: 0;
            background: rgba(124,58,237,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-light); font-size: 16px;
        }
        .modal-field-content { flex: 1; min-width: 0; }
        .modal-field-label {
            font-size: 11px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: .5px;
        }
        .modal-field-value {
            font-size: 14px; color: var(--text); margin-top: 3px;
            word-break: break-word; line-height: 1.5;
        }
        .modal-field-value a {
            color: var(--blue); text-decoration: none;
        }
        .modal-field-value a:hover { text-decoration: underline; }
        .modal-field-value .empty { color: var(--text-dim); font-style: italic; }

        /* ── Mobile ──────────────────── */
        @media (max-width: 768px) {
            .navbar { padding: 12px 16px; }
            .nav-brand { font-size: 15px; }
            .nav-user { display: none !important; }
            .container { padding: 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 14px; }
            .stat-value { font-size: 22px; }
            .filter-bar { flex-direction: column; gap: 8px; }
            .filter-bar input, .filter-bar select, .btn-reset { width: 100%; }
            .fit-grid { grid-template-columns: 1fr; }
            .modal-card { max-width: 100%; border-radius: 16px; }
            .modal-header { padding: 16px 18px 14px; }
            .modal-body { padding: 16px 18px 24px; }
            .modal-score-num { font-size: 28px; }
        }
        @media (min-width: 769px) {
            .nav-user { display: block; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-brand-icon">📡</div>
            <span>Spirelia Intelligence</span>
        </div>
        <div class="nav-right">
            <span class="nav-badge" id="leadCount">—</span>
            <span class="nav-user" id="userEmail"></span>
            <button class="btn-logout" id="logoutBtn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-row hidden" id="statsRow">
            <div class="stat-card"><div class="stat-label">Total Leads</div><div class="stat-value purple" id="statTotal">0</div></div>
            <div class="stat-card"><div class="stat-label">Avg Score</div><div class="stat-value blue" id="statAvg">—</div></div>
            <div class="stat-card"><div class="stat-label">Top Score</div><div class="stat-value green" id="statTop">—</div></div>
            <div class="stat-card"><div class="stat-label">Companies</div><div class="stat-value amber" id="statCompanies">0</div></div>
        </div>

        <!-- Filters -->
        <div class="filter-bar hidden" id="filterBar">
            <input type="text" id="searchBox" class="search-input" placeholder="🔍  Search all leads…">
            <select id="filterCol" class="filter-select"><option value="">Filter by column…</option></select>
            <input type="text" id="filterVal" class="filter-value" placeholder="Contains…" disabled>
            <button class="btn-reset" id="resetBtn">↺ Reset</button>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader">
            <div class="loader-ring"></div>
            <p>Loading intelligence data…</p>
        </div>

        <!-- Error -->
        <div id="errorBox" class="error-box"></div>

        <!-- Table -->
        <div class="table-card hidden" id="tableCard">
            <div class="table-wrap">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Fit Reasons -->
        <div class="fit-section hidden" id="fitSection">
            <h2>💡 Fit Reason Highlights</h2>
            <div class="fit-grid" id="fitGrid"></div>
        </div>
    </div>

    <!-- Lead Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <div class="modal-header">
                <h2><i class="bi bi-building"></i> <span id="modalTitle">Lead Detail</span></h2>
                <button class="modal-close" id="modalClose"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

<script>
    // ─── Auth Gate ────────────────────────────────
    const TOKEN = localStorage.getItem('spirelia_token');
    if (!TOKEN) window.location.href = '/login.html';

    const AUTH = { Authorization: 'Bearer ' + TOKEN };

    // Check auth on load
    (async () => {
        try {
            const r = await fetch('/api/check-auth', { headers: AUTH });
            if (!r.ok) throw new Error();
            const d = await r.json();
            document.getElementById('userEmail').textContent = d.email;
        } catch {
            localStorage.removeItem('spirelia_token');
            localStorage.removeItem('spirelia_email');
            window.location.href = '/login.html';
        }
    })();

    // ─── DOM Refs ─────────────────────────────────
    const $ = id => document.getElementById(id);
    const searchBox  = $('searchBox');
    const filterCol  = $('filterCol');
    const filterVal  = $('filterVal');
    const resetBtn   = $('resetBtn');
    const loader     = $('loader');
    const errorBox   = $('errorBox');
    const statsRow   = $('statsRow');
    const filterBar  = $('filterBar');
    const tableCard  = $('tableCard');
    const tableHead  = $('tableHead');
    const tableBody  = $('tableBody');
    const fitSection = $('fitSection');
    const fitGrid    = $('fitGrid');
    const leadCount  = $('leadCount');

    let allHeaders = [], allLeads = [];

    // ─── Fetch Leads ──────────────────────────────
    async function fetchLeads() {
        try {
            const res = await fetch('/api/leads', { headers: AUTH });
            if (res.status === 401) {
                localStorage.removeItem('spirelia_token');
                window.location.href = '/login.html';
                return;
            }
            if (!res.ok) {
                const e = await res.json().catch(() => ({}));
                throw new Error(e.error || 'Server error');
            }

            const data = await res.json();
            allHeaders = Array.isArray(data.headers) ? data.headers : [];
            allLeads   = Array.isArray(data.leads)   ? data.leads   : [];

            if (allHeaders.length === 0) throw new Error('No data found in sheet.');

            leadCount.textContent = allLeads.length + ' leads';

            // Populate filter dropdown
            allHeaders.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h; opt.textContent = h;
                filterCol.appendChild(opt);
            });

            computeStats();
            renderTable(allHeaders, allLeads);
            renderFit(allLeads);

            loader.classList.add('hidden');
            statsRow.classList.remove('hidden');
            filterBar.classList.remove('hidden');
            tableCard.classList.remove('hidden');
            fitSection.classList.remove('hidden');
        } catch (err) {
            loader.classList.add('hidden');
            errorBox.style.display = 'block';
            errorBox.textContent = '⚠ ' + err.message;
            leadCount.textContent = '0 leads';
        }
    }

    // ─── Stats ────────────────────────────────────
    function computeStats() {
        $('statTotal').textContent = allLeads.length;
        const scores = allLeads.map(l => parseInt(l['Score'])).filter(n => !isNaN(n));
        if (scores.length) {
            $('statAvg').textContent = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
            $('statTop').textContent = Math.max(...scores);
        }
        const companies = new Set(allLeads.map(l => l['Company']).filter(Boolean));
        $('statCompanies').textContent = companies.size;
    }

    // ─── Render Table ─────────────────────────────
    function renderTable(headers, leads) {
        tableHead.innerHTML = '<tr>' + headers.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';
        tableBody.innerHTML = leads.map((lead, idx) =>
            `<tr data-idx="${idx}" onclick="openLeadModal(${idx})">` + headers.map(h => {
                let v = lead[h] || '';
                if (h === 'Score' && v) {
                    const n = parseInt(v);
                    const cls = n >= 90 ? 'score-high' : n >= 70 ? 'score-mid' : 'score-low';
                    return `<td><span class="score-badge ${cls}">${esc(v)}</span></td>`;
                }
                if (v.startsWith('http')) {
                    const label = v.length > 35 ? v.slice(0, 35) + '…' : v;
                    return `<td><a href="${esc(v)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(label)}</a></td>`;
                }
                return `<td title="${esc(v)}">${esc(v)}</td>`;
            }).join('') + '</tr>'
        ).join('');
        currentFilteredLeads = leads;
    }

    let currentFilteredLeads = [];

    // ─── Icon Map ─────────────────────────────────
    const FIELD_ICONS = {
        'Date': 'bi-calendar3',
        'Company': 'bi-building',
        'Position': 'bi-person-badge',
        'Role Summary': 'bi-file-text',
        'Company Bio': 'bi-info-circle',
        'Posted': 'bi-clock-history',
        'Domain': 'bi-globe2',
        'Email': 'bi-envelope-at',
        'LinkedIn': 'bi-linkedin',
        'Score': 'bi-speedometer2',
        'Decision Maker Link': 'bi-person-lines-fill',
        'Wikipedia Link': 'bi-wikipedia',
        'Message ID': 'bi-hash',
        'Fit Reason': 'bi-lightbulb'
    };

    // ─── Lead Detail Modal ────────────────────────
    const modalOverlay = $('modalOverlay');
    const modalCard    = $('modalCard');
    const modalClose   = $('modalClose');
    const modalTitle   = $('modalTitle');
    const modalBody    = $('modalBody');

    function openLeadModal(idx) {
        const lead = currentFilteredLeads[idx];
        if (!lead) return;

        const company = lead['Company'] || 'Lead Detail';
        const position = lead['Position'] || '';
        modalTitle.textContent = company;

        let html = '';

        // Score + Fit Reason hero row
        const score = parseInt(lead['Score']);
        const fitReason = lead['Fit Reason'] || '';
        if (!isNaN(score) || fitReason) {
            const sColor = score >= 90 ? 'var(--green)' : score >= 70 ? 'var(--amber)' : 'var(--blue)';
            html += `<div class="modal-score-row">`;
            if (!isNaN(score)) {
                html += `<div><div class="modal-score-num" style="color:${sColor}">${score}</div><div class="modal-score-label">Fit Score</div></div>`;
            }
            if (fitReason) {
                html += `<div style="flex:1"><div class="modal-score-label">Why This Lead Fits</div><div class="modal-score-reason">${esc(fitReason)}</div></div>`;
            }
            html += `</div>`;
        }

        // All fields
        const skipInBody = ['Score', 'Fit Reason'];
        allHeaders.filter(h => !skipInBody.includes(h)).forEach(h => {
            const v = lead[h] || '';
            const icon = FIELD_ICONS[h] || 'bi-dot';
            let valHtml;

            if (!v) {
                valHtml = '<span class="empty">—</span>';
            } else if (v.startsWith('http')) {
                const label = v.length > 50 ? v.slice(0, 50) + '…' : v;
                valHtml = `<a href="${esc(v)}" target="_blank" rel="noopener"><i class="bi bi-box-arrow-up-right" style="margin-right:4px"></i>${esc(label)}</a>`;
            } else {
                valHtml = esc(v);
            }

            html += `<div class="modal-field">
                <div class="modal-field-icon"><i class="bi ${icon}"></i></div>
                <div class="modal-field-content">
                    <div class="modal-field-label">${esc(h)}</div>
                    <div class="modal-field-value">${valHtml}</div>
                </div>
            </div>`;
        });

        modalBody.innerHTML = html;
        modalOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ─── Fit Reasons ──────────────────────────────
    function renderFit(leads) {
        fitGrid.innerHTML = '';
        const fitH = allHeaders.find(h => h.toLowerCase().includes('fit'));
        const nameH = allHeaders.find(h => h.toLowerCase().includes('company')) || allHeaders[1];
        if (!fitH) return;

        leads.filter(l => l[fitH] && !l[fitH].toLowerCase().startsWith('does not'))
             .slice(0, 6)
             .forEach(lead => {
                 fitGrid.innerHTML += `<div class="fit-card"><strong>${esc(lead[nameH] || 'Unknown')}</strong><p>${esc(lead[fitH])}</p></div>`;
             });
    }

    // ─── Escape ───────────────────────────────────
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ─── Filter Logic ─────────────────────────────
    searchBox.addEventListener('input', applyFilters);
    filterCol.addEventListener('change', () => {
        filterVal.disabled = !filterCol.value;
        filterVal.value = '';
        applyFilters();
    });
    filterVal.addEventListener('input', applyFilters);
    resetBtn.addEventListener('click', () => {
        searchBox.value = ''; filterCol.value = ''; filterVal.value = ''; filterVal.disabled = true;
        renderTable(allHeaders, allLeads);
    });

    function applyFilters() {
        let f = [...allLeads];
        const q = searchBox.value.trim().toLowerCase();
        if (q) f = f.filter(l => Object.values(l).some(v => v.toLowerCase().includes(q)));
        const col = filterCol.value, val = filterVal.value.trim().toLowerCase();
        if (col && val) f = f.filter(l => (l[col] || '').toLowerCase().includes(val));
        renderTable(allHeaders, f);
    }

    // ─── Logout ───────────────────────────────────
    async function logout() {
        try { await fetch('/api/logout', { method: 'POST', headers: AUTH }); } catch {}
        localStorage.removeItem('spirelia_token');
        localStorage.removeItem('spirelia_email');
        window.location.href = '/login.html';
    }

    // ─── Init ─────────────────────────────────────
    fetchLeads();
</script>
</body>
</html>
